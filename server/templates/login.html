<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server Room Monitor — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 14px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .logo { font-size: 2.4rem; }
    h2 { color: #58a6ff; font-size: 1.4rem; margin: 0; }
    p.sub { color: #8b949e; font-size: 0.9rem; margin-top: 4px; }
    .form-label { color: #8b949e; font-size: 0.85rem; margin-bottom: 5px; }
    .form-control {
      background: #0d1117;
      border: 1px solid #30363d;
      color: #c9d1d9;
      border-radius: 8px;
    }
    .form-control:focus {
      background: #0d1117;
      border-color: #58a6ff;
      color: #c9d1d9;
      box-shadow: 0 0 0 3px rgba(88,166,255,0.15);
    }
    .btn-login {
      background: #238636;
      border: 1px solid #2ea043;
      color: #fff;
      border-radius: 8px;
      padding: 10px;
      font-weight: 600;
      width: 100%;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn-login:hover { background: #2ea043; color: #fff; }
    .alert-danger {
      background: rgba(248,81,73,0.15);
      border: 1px solid rgba(248,81,73,0.4);
      color: #f85149;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.9rem;
    }
    .divider {
      border-color: #30363d;
      margin: 24px 0;
    }
    .badge-secure {
      display: inline-block;
      background: rgba(35,134,54,0.2);
      border: 1px solid rgba(35,134,54,0.5);
      color: #3fb950;
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 20px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="text-center mb-4">
      <div class="logo">&#128274;</div>
      <h2>Server Room Monitor</h2>
      <p class="sub">Secure Admin Dashboard</p>
      <span class="badge-secure">&#128272; Encrypted Access</span>
    </div>

    {% if error %}
    <div class="alert-danger mb-3">&#9888; {{ error }}</div>
    {% endif %}

    <form method="POST" autocomplete="off">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" name="username"
               placeholder="admin" required autofocus autocomplete="username">
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" name="password"
               placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login">Login</button>
    </form>

    <hr class="divider">
    <p class="text-center mb-0" style="color:#8b949e; font-size:0.78rem;">
      IoT Server Room Monitor &mdash; v1.0
    </p>
  </div>
</body>
</html>
